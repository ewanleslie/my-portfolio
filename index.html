<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name — Portfolio</title>
  <meta name="description" content="Personal portfolio and selected projects." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">Your Name</h1>
      <p class="site-tagline">Developer &amp; maker. A few things I've built.</p>
    </div>
  </header>

  <main class="container">
    <section aria-labelledby="projects-heading">
      <h2 id="projects-heading" class="section-title">Projects</h2>
      <div id="projects" class="project-grid">
        <!-- Cards are rendered by script.js -->
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> Your Name</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
